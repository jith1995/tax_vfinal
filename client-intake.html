<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Redirecting to Your CA Partner Intake</title>
  <style>
    :root{color-scheme:light;--ink:#18202a;--muted:#64748b;--brand:#2563eb;--bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 20%,#e0f2fe,transparent 32%),var(--bg);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);}
    .card{width:min(560px,calc(100% - 32px));background:var(--card);border:1px solid var(--border);border-radius:28px;padding:34px;box-shadow:0 22px 80px rgba(15,23,42,.12);}
    h1{margin:0 0 10px;font-size:clamp(28px,5vw,42px);letter-spacing:-.04em;}
    p{margin:0 0 22px;color:var(--muted);line-height:1.65;font-size:16px;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;padding:13px 18px;background:var(--brand);color:#fff;text-decoration:none;font-weight:800;box-shadow:0 12px 30px rgba(37,99,235,.26);}
    .small{margin-top:18px;font-size:13px;color:var(--muted);}
  </style>
</head>
<body>
  <main class="card">
    <h1>Opening the intake form</h1>
    <p>We have moved lead capture to Tally so your details go cleanly into our response sheet.</p>
    <a id="fallbackLink" class="btn" href="https://tally.so/r/VLxDEN?plan=general">Open form</a>
    <div class="small">If you are not redirected automatically, use the button above.</div>
  </main>
  <script>
    const BASE_FORM_URL = 'https://tally.so/r/VLxDEN';
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan') || 'general';
    const safePlan = encodeURIComponent(plan);
    const nextUrl = `${BASE_FORM_URL}?plan=${safePlan}`;
    document.getElementById('fallbackLink').href = nextUrl;
    setTimeout(() => { window.location.href = nextUrl; }, 700);
  </script>
</body>
</html>
